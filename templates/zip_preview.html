<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zip Preview — Customer View</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.admin-bar{background:rgba(245,197,24,.08);border-bottom:1px solid rgba(245,197,24,.2);padding:.5rem 1.25rem;font-size:.8rem;color:#F5C518;display:flex;align-items:center;gap:1rem}
.admin-bar a{color:#F5C518;text-decoration:none;font-weight:600}
.main{padding:1.5rem;max-width:900px;margin:0 auto}
.pricing-banner{background:#0a1e2e;border:1px solid rgba(245,197,24,.25);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.pricing-banner-title{font-size:.75rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.5rem}
.pricing-banner-group{font-size:1.3rem;font-weight:700;color:#F5C518;margin-bottom:.75rem}
.tier-chips{display:flex;gap:.5rem;flex-wrap:wrap}
.tier-chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.5rem .9rem;font-size:.82rem;text-align:center}
.tier-chip .people{color:rgba(255,255,255,.5);font-size:.72rem;margin-bottom:.2rem}
.tier-chip .price{font-weight:700;color:#fff;font-size:.95rem}
.tier-chip.active{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.4)}
.tier-chip.active .price{color:#F5C518}
.unassigned-notice{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.85rem;color:#f87171}
.folder-header{margin-bottom:1.25rem}
.folder-title{font-size:1.4rem;font-weight:700}
.folder-sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-top:.25rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem}
.photo-card{background:#0a1e2e;border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.photo-card:hover{border-color:rgba(245,197,24,.3)}
.photo-card img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.photo-card .photo-name{font-size:.72rem;color:rgba(255,255,255,.35);padding:.4rem .6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{color:rgba(255,255,255,.3);padding:3rem;text-align:center}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:1rem;right:1.25rem;font-size:1.75rem;cursor:pointer;color:rgba(255,255,255,.6);line-height:1}
.lb-close:hover{color:#fff}
.lb-name{margin-top:.75rem;font-size:.8rem;color:rgba(255,255,255,.4)}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:2rem;cursor:pointer;color:rgba(255,255,255,.5);padding:1rem;user-select:none}
.lb-nav:hover{color:#fff}
.lb-prev{left:.5rem}
.lb-next{right:.5rem}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES</div>
  <div class="topbar-spacer"></div>
</div>

<div class="admin-bar">
  ADMIN PREVIEW — This is what the customer sees &nbsp;|&nbsp;
  <a href="/admin/zip-folders">← Back to Folders</a>
  <a href="/admin/zip-pricing">Edit Pricing</a>
</div>

<div class="main" id="main"><div class="empty">Loading…</div></div>

<div class="lb" id="lb">
  <span class="lb-close" onclick="closeLb()">✕</span>
  <span class="lb-nav lb-prev" onclick="navLb(-1)">‹</span>
  <img id="lb-img" src="">
  <div class="lb-name" id="lb-name"></div>
  <span class="lb-nav lb-next" onclick="navLb(1)">›</span>
</div>

<script>
const pathParts = window.location.pathname.split('/');
const date = pathParts[pathParts.length - 2];
const lastName = decodeURIComponent(pathParts[pathParts.length - 1]);

let photos = [];
let lbIdx = 0;

window.addEventListener('load', async () => {
  const res = await fetch(`/api/zip-preview/${date}/${encodeURIComponent(lastName)}`);
  const d = await res.json();
  photos = d.photos || [];
  render(d);
});

function render(d) {
  const main = document.getElementById('main');

  let pricingHtml = '';
  if (!d.group_size) {
    pricingHtml = `<div class="unassigned-notice">⚠ No group size assigned to this folder yet. Go to <a href="/admin/zip-folders" style="color:#f87171;font-weight:600">Folder Assignment</a> to set it.</div>`;
  } else {
    pricingHtml = `<div class="pricing-banner">
      <div class="pricing-banner-title">Your Pricing</div>
      <div class="pricing-banner-group">${d.group_size} Person Group${d.price !== null ? ` — $${d.price}` : ''}</div>
      <div style="font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:.75rem">All photos from your session included</div>
    </div>`;
  }

  main.innerHTML = `
    <div class="folder-header">
      <div class="folder-title">${lastName}</div>
      <div class="folder-sub">${d.location} · ${new Date(date + 'T12:00:00').toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})}</div>
    </div>
    ${pricingHtml}
    <div class="photo-grid">
      ${photos.map((p, i) => `
        <div class="photo-card" onclick="openLb(${i})">
          <img src="${p.url}" loading="lazy" alt="${p.filename}">
          <div class="photo-name">${p.filename}</div>
        </div>`).join('')}
    </div>
    ${!photos.length ? '<div class="empty">No photos found for this folder</div>' : ''}
  `;
}

function openLb(i) {
  lbIdx = i;
  document.getElementById('lb-img').src = photos[i].url;
  document.getElementById('lb-name').textContent = photos[i].filename;
  document.getElementById('lb').classList.add('open');
}

function closeLb() {
  document.getElementById('lb').classList.remove('open');
}

function navLb(dir) {
  lbIdx = (lbIdx + dir + photos.length) % photos.length;
  document.getElementById('lb-img').src = photos[lbIdx].url;
  document.getElementById('lb-name').textContent = photos[lbIdx].filename;
}

document.getElementById('lb').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLb();
});

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'Escape') closeLb();
});
</script>
</body>
</html>

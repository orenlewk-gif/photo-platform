<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zip Preview — Customer View</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.admin-bar{background:rgba(245,197,24,.08);border-bottom:1px solid rgba(245,197,24,.2);padding:.5rem 1.25rem;font-size:.8rem;color:#F5C518;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.admin-bar a{color:#F5C518;text-decoration:none;font-weight:600}
.main{padding:1.5rem;max-width:940px;margin:0 auto}
.folder-header{margin-bottom:1.25rem}
.folder-title{font-size:1.5rem;font-weight:700}
.folder-sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-top:.25rem}
/* Pricing banner */
.pricing-banner{background:#0a1e2e;border:1px solid rgba(245,197,24,.2);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.75rem}
.pricing-banner-label{font-size:.7rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.4rem}
.pricing-banner-group{font-size:1.15rem;font-weight:700;color:#F5C518;margin-bottom:1rem}
.pricing-options{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:.6rem}
.pricing-option{background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);border-radius:9px;padding:.75rem 1rem;text-align:center;cursor:pointer;transition:all .15s}
.pricing-option:hover{border-color:rgba(245,197,24,.4);background:rgba(245,197,24,.06)}
.pricing-option.selected{border-color:#F5C518;background:rgba(245,197,24,.1)}
.opt-label{font-size:.75rem;color:rgba(255,255,255,.5);margin-bottom:.3rem}
.opt-price{font-size:1.1rem;font-weight:700;color:#fff}
.pricing-option.selected .opt-price{color:#F5C518}
.shop-btn{width:100%;background:#F5C518;color:#0c2336;border:none;border-radius:9px;padding:.85rem;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:1rem;display:none}
.shop-btn.visible{display:block}
.shop-btn:hover{background:#e6b800}
.unassigned-notice{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:.85rem;color:#f87171}
/* Photo grid */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
.photo-card{background:#0a1e2e;border:1px solid rgba(255,255,255,.07);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.photo-card:hover{border-color:rgba(245,197,24,.3)}
.photo-card img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block}
.empty{color:rgba(255,255,255,.3);padding:3rem;text-align:center}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;align-items:center;justify-content:center;flex-direction:column}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:6px}
.lb-close{position:absolute;top:1rem;right:1.25rem;font-size:1.75rem;cursor:pointer;color:rgba(255,255,255,.6)}
.lb-close:hover{color:#fff}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);font-size:2.5rem;cursor:pointer;color:rgba(255,255,255,.4);padding:1rem;user-select:none}
.lb-nav:hover{color:#fff}
.lb-prev{left:.25rem}
.lb-next{right:.25rem}
.lb-counter{position:absolute;bottom:1.25rem;font-size:.8rem;color:rgba(255,255,255,.4)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES</div>
  <div class="topbar-spacer"></div>
</div>
<div class="admin-bar">
  ADMIN PREVIEW — Customer view &nbsp;|&nbsp;
  <a href="/admin/zip-folders">← Back to Folders</a>
  <a href="/admin/zip-pricing">Edit Pricing</a>
</div>

<div class="main" id="main"><div class="empty">Loading…</div></div>

<div class="lb" id="lb">
  <span class="lb-close" onclick="closeLb()">✕</span>
  <span class="lb-nav lb-prev" onclick="navLb(-1)">‹</span>
  <img id="lb-img" src="">
  <span class="lb-nav lb-next" onclick="navLb(1)">›</span>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
const pathParts = window.location.pathname.split('/');
const date = pathParts[pathParts.length - 2];
const lastName = decodeURIComponent(pathParts[pathParts.length - 1]);

let photos = [];
let lbIdx = 0;
let selectedOption = null;

window.addEventListener('load', async () => {
  const res = await fetch(`/api/zip-preview/${date}/${encodeURIComponent(lastName)}`);
  const d = await res.json();
  photos = d.photos || [];
  render(d);
});

function render(d) {
  const main = document.getElementById('main');
  const tier = d.tier;

  let pricingHtml = '';
  if (!d.group_size) {
    pricingHtml = `<div class="unassigned-notice">⚠ No group size assigned to this folder. Go to <a href="/admin/zip-folders" style="color:#f87171;font-weight:600">Folder Assignment</a> to set it.</div>`;
  } else if (!tier) {
    pricingHtml = `<div class="unassigned-notice">⚠ Group size set to "${d.group_size}" but no matching pricing tier found. Check <a href="/admin/zip-pricing" style="color:#f87171;font-weight:600">Pricing Tiers</a>.</div>`;
  } else {
    const opts = [
      {label: '1 Photo', key: 'one_photo', price: tier.one_photo},
      {label: '2 Photos', key: 'two_photos', price: tier.two_photos},
      {label: '3 Photos', key: 'three_photos', price: tier.three_photos},
      {label: 'All Photos', key: 'all_photos', price: tier.all_photos},
    ].filter(o => o.price);

    const optHtml = opts.map(o => `
      <div class="pricing-option" onclick="selectOption('${o.key}', ${o.price}, this)">
        <div class="opt-label">${o.label}</div>
        <div class="opt-price">$${o.price}</div>
      </div>`).join('');

    pricingHtml = `<div class="pricing-banner">
      <div class="pricing-banner-label">Your Pricing</div>
      <div class="pricing-banner-group">${d.group_size} Person Group</div>
      <div class="pricing-options">${optHtml}</div>
      <button class="shop-btn" id="shopBtn">Add to Cart</button>
    </div>`;
  }

  main.innerHTML = `
    <div class="folder-header">
      <div class="folder-title">${lastName}</div>
      <div class="folder-sub">${d.location} · ${new Date(date + 'T12:00:00').toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'})} · ${d.photo_count} photos</div>
    </div>
    ${pricingHtml}
    <div class="photo-grid">
      ${photos.map((p, i) => `
        <div class="photo-card" onclick="openLb(${i})">
          <img src="${p.url}" loading="lazy" alt="${p.filename}">
        </div>`).join('')}
    </div>
    ${!photos.length ? '<div class="empty">No photos found</div>' : ''}
  `;
}

function selectOption(key, price, el) {
  selectedOption = {key, price};
  document.querySelectorAll('.pricing-option').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  const btn = document.getElementById('shopBtn');
  if (btn) { btn.textContent = `Continue with $${price}`; btn.classList.add('visible'); }
}

function openLb(i) {
  lbIdx = i;
  updateLb();
  document.getElementById('lb').classList.add('open');
}
function closeLb() { document.getElementById('lb').classList.remove('open'); }
function navLb(dir) { lbIdx = (lbIdx + dir + photos.length) % photos.length; updateLb(); }
function updateLb() {
  document.getElementById('lb-img').src = photos[lbIdx].url;
  document.getElementById('lb-counter').textContent = `${lbIdx + 1} / ${photos.length}`;
}
document.getElementById('lb').addEventListener('click', e => { if (e.target === e.currentTarget) closeLb(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navLb(1);
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'Escape') closeLb();
});
</script>
</body>
</html>

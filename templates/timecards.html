<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Images — Time Cards</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px;flex-shrink:0}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{padding:1.5rem;max-width:1100px;margin:0 auto}
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.toolbar h2{font-size:1.1rem;font-weight:600;flex:1}
select,input[type=date]{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:7px;color:#fff;padding:.45rem .75rem;font-size:.85rem;outline:none}
select option{background:#0a1e2e}
select:focus,input[type=date]:focus{border-color:#F5C518}
.btn{border:none;border-radius:7px;padding:.5rem 1rem;font-size:.85rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:.4rem}
.btn-primary{background:#F5C518;color:#0c2336}
.btn-primary:hover{background:#e6b800}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);color:#f87171}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-sm{padding:.3rem .65rem;font-size:.78rem}
/* Photographer tabs */
.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:.4rem .85rem;font-size:.82rem;cursor:pointer;color:rgba(255,255,255,.6);transition:all .15s}
.tab:hover{background:rgba(255,255,255,.1)}
.tab.active{background:#F5C518;color:#0c2336;border-color:#F5C518;font-weight:700}
/* Summary bar */
.summary-bar{display:flex;gap:1.25rem;margin-bottom:1.25rem;flex-wrap:wrap}
.summary-chip{background:#0a1e2e;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.6rem 1rem;font-size:.82rem;color:rgba(255,255,255,.5)}
.summary-chip strong{color:#F5C518;font-size:1.05rem;display:block;margin-top:.1rem}
/* Day groups */
.day-group{margin-bottom:1rem}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:.5rem}
.day-label{font-size:.85rem;font-weight:600;color:rgba(255,255,255,.7)}
.day-total{font-size:.8rem;color:#F5C518;font-weight:600}
/* Records table */
.record-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.75rem;align-items:center;background:#0a1e2e;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:.65rem 1rem;margin-bottom:.4rem}
.record-row.editing{border-color:rgba(245,197,24,.3);background:#0d2540}
.rec-field{font-size:.85rem;color:rgba(255,255,255,.8)}
.rec-label{font-size:.7rem;color:rgba(255,255,255,.35);margin-bottom:.15rem}
.rec-actions{display:flex;gap:.4rem}
.duration-badge{display:inline-block;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80;border-radius:4px;padding:.1rem .4rem;font-size:.75rem;font-weight:600}
.open-badge{display:inline-block;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2);color:#fbbf24;border-radius:4px;padding:.1rem .4rem;font-size:.75rem}
.edit-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.75rem;align-items:end;background:#0d2540;border:1px solid rgba(245,197,24,.3);border-radius:8px;padding:.75rem 1rem;margin-bottom:.4rem}
.edit-row label{font-size:.72rem;color:rgba(255,255,255,.4);display:block;margin-bottom:.3rem}
.edit-row input,.edit-row select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;padding:.45rem .65rem;font-size:.82rem;outline:none}
.edit-row input:focus,.edit-row select:focus{border-color:#F5C518}
.empty{color:rgba(255,255,255,.3);padding:3rem;text-align:center;font-size:.95rem}
/* Add record modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#0a1e2e;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:1.75rem;width:100%;max-width:480px}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:1.25rem}
.modal label{display:block;font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:.3rem;margin-top:.9rem}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:7px;color:#fff;padding:.65rem .9rem;font-size:.9rem;outline:none}
.modal input:focus,.modal select:focus{border-color:#F5C518}
.modal-actions{display:flex;gap:.75rem;margin-top:1.5rem;justify-content:flex-end}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;transition:opacity .3s;opacity:0}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — TIME CARDS</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/photographers" style="margin-left:.75rem">Photographers</a>
</div>

<div class="main">
  <div class="toolbar">
    <h2>Time Cards</h2>
    <input type="date" id="dateFrom">
    <span style="color:rgba(255,255,255,.3);font-size:.85rem">to</span>
    <input type="date" id="dateTo">
    <button class="btn btn-ghost" onclick="load()">Filter</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Add Record</button>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="summary-bar" id="summary"></div>
  <div id="content"><div class="empty">Loading…</div></div>
</div>

<!-- Add Record Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Add Time Record</h3>
    <label>Photographer</label>
    <select id="addPhotographer"></select>
    <label>Location</label>
    <select id="addLocation">
      <option value="">Select location…</option>
      <option>Lone Peak Portraits</option>
      <option>Explorer Gondola</option>
      <option>Ramcharger Portraits</option>
      <option>Mountain Biking</option>
      <option>Adventure Zip Line</option>
    </select>
    <label>Clock In</label>
    <input type="datetime-local" id="addClockIn">
    <label>Clock Out</label>
    <input type="datetime-local" id="addClockOut">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitAdd()">Add Record</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allRecords = [];
let photographers = [];
let activePhotographerId = 'all';

// Default date range: last 30 days
const today = new Date();
const d30 = new Date(today); d30.setDate(d30.getDate() - 30);
document.getElementById('dateFrom').value = d30.toISOString().split('T')[0];
document.getElementById('dateTo').value   = today.toISOString().split('T')[0];

window.addEventListener('load', load);

async function load() {
  try {
    const res = await fetch('/api/clock/records');
    const d = await res.json();
    allRecords = d.records || [];
    photographers = d.photographers || [];
    populatePhotographerSelect();
    renderTabs();
    renderContent();
  } catch(e) {
    showToast('Failed to load records');
  }
}

function populatePhotographerSelect() {
  const sel = document.getElementById('addPhotographer');
  sel.innerHTML = photographers.map(p =>
    `<option value="${p.id}">${p.name}</option>`).join('');
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = `<div class="tab ${activePhotographerId==='all'?'active':''}" onclick="setTab('all')">All</div>` +
    photographers.map(p => `<div class="tab ${activePhotographerId===p.id?'active':''}" onclick="setTab('${p.id}')">${p.name}</div>`).join('');
}

function setTab(id) {
  activePhotographerId = id;
  renderTabs();
  renderContent();
}

function filteredRecords() {
  const from = document.getElementById('dateFrom').value;
  const to   = document.getElementById('dateTo').value;
  return allRecords.filter(r => {
    const date = (r.clock_in || '').slice(0,10);
    if (from && date < from) return false;
    if (to   && date > to)   return false;
    if (activePhotographerId !== 'all' && r.photographer_id !== activePhotographerId) return false;
    return true;
  });
}

function calcHours(r) {
  if (!r.clock_in || !r.clock_out) return null;
  return (new Date(r.clock_out) - new Date(r.clock_in)) / 3600000;
}

function fmtHours(h) {
  if (h === null) return null;
  const hrs = Math.floor(h), mins = Math.round((h - hrs) * 60);
  return hrs > 0 ? `${hrs}h ${mins}m` : `${mins}m`;
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function renderContent() {
  const records = filteredRecords();

  // Summary
  let totalHours = 0, shifts = 0;
  records.forEach(r => { const h = calcHours(r); if (h !== null) { totalHours += h; shifts++; } });
  const byPerson = {};
  records.forEach(r => {
    if (!byPerson[r.photographer_name]) byPerson[r.photographer_name] = 0;
    const h = calcHours(r); if (h !== null) byPerson[r.photographer_name] += h;
  });
  let summaryHtml = `<div class="summary-chip">Total Shifts<strong>${shifts}</strong></div>
    <div class="summary-chip">Total Hours<strong>${fmtHours(totalHours) || '0h'}</strong></div>`;
  if (activePhotographerId === 'all') {
    Object.entries(byPerson).forEach(([name, h]) => {
      summaryHtml += `<div class="summary-chip">${name}<strong>${fmtHours(h) || '0h'}</strong></div>`;
    });
  }
  document.getElementById('summary').innerHTML = summaryHtml;

  // Group by date
  const content = document.getElementById('content');
  if (!records.length) { content.innerHTML = '<div class="empty">No records in this range</div>'; return; }

  const byDate = {};
  records.forEach(r => {
    const date = (r.clock_in || '').slice(0,10) || 'Unknown';
    if (!byDate[date]) byDate[date] = [];
    byDate[date].push(r);
  });

  const sorted = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
  content.innerHTML = sorted.map(date => {
    const dayRecs = byDate[date];
    const dayHours = dayRecs.reduce((s,r) => { const h=calcHours(r); return h ? s+h : s; }, 0);
    const dateLabel = new Date(date + 'T12:00:00').toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
    const rows = dayRecs.map(r => renderRow(r)).join('');
    return `<div class="day-group">
      <div class="day-header">
        <div class="day-label">${dateLabel}</div>
        <div class="day-total">${dayHours > 0 ? fmtHours(dayHours) : ''}</div>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

function renderRow(r) {
  const h = calcHours(r);
  const durBadge = h !== null
    ? `<span class="duration-badge">${fmtHours(h)}</span>`
    : `<span class="open-badge">Still in</span>`;
  const nameCell = activePhotographerId === 'all'
    ? `<div class="rec-label">Photographer</div><div class="rec-field">${r.photographer_name}</div>`
    : `<div class="rec-label">Location</div><div class="rec-field">${r.location || '—'}</div>`;
  return `<div class="record-row" id="row_${r.id}">
    <div>${nameCell}</div>
    <div><div class="rec-label">Clock In</div><div class="rec-field">${fmtTime(r.clock_in)}</div></div>
    <div><div class="rec-label">Clock Out</div><div class="rec-field">${fmtTime(r.clock_out)} ${durBadge}</div></div>
    <div class="rec-actions">
      <button class="btn btn-ghost btn-sm" onclick="startEdit('${r.id}')">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="deleteRecord('${r.id}')">Delete</button>
    </div>
  </div>`;
}

function toLocalInput(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function toUTCIso(localStr) {
  if (!localStr) return null;
  return new Date(localStr).toISOString();
}

function startEdit(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;
  const row = document.getElementById(`row_${id}`);
  row.outerHTML = `<div class="edit-row" id="row_${id}">
    <div>
      <label>Location</label>
      <select id="eLocation_${id}">
        <option value="">—</option>
        ${['Lone Peak Portraits','Explorer Gondola','Ramcharger Portraits','Mountain Biking','Adventure Zip Line']
          .map(l => `<option ${r.location===l?'selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div>
      <label>Clock In</label>
      <input type="datetime-local" id="eIn_${id}" value="${toLocalInput(r.clock_in)}">
    </div>
    <div>
      <label>Clock Out</label>
      <input type="datetime-local" id="eOut_${id}" value="${toLocalInput(r.clock_out)}">
    </div>
    <div style="display:flex;gap:.4rem;padding-top:1.1rem">
      <button class="btn btn-primary btn-sm" onclick="saveEdit('${id}')">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="renderContent()">Cancel</button>
    </div>
  </div>`;
}

async function saveEdit(id) {
  const clockIn  = document.getElementById(`eIn_${id}`).value;
  const clockOut = document.getElementById(`eOut_${id}`).value;
  const location = document.getElementById(`eLocation_${id}`).value;
  try {
    const res = await fetch(`/api/clock/record/${id}`, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        clock_in:  toUTCIso(clockIn),
        clock_out: clockOut ? toUTCIso(clockOut) : null,
        location
      })
    });
    if (!res.ok) throw new Error();
    const d = await res.json();
    const idx = allRecords.findIndex(x => x.id === id);
    if (idx >= 0) allRecords[idx] = d.record;
    renderContent();
    showToast('Record updated');
  } catch(e) {
    showToast('Failed to save');
  }
}

async function deleteRecord(id) {
  if (!confirm('Delete this time record?')) return;
  try {
    const res = await fetch(`/api/clock/record/${id}`, {method:'DELETE'});
    if (!res.ok) throw new Error();
    allRecords = allRecords.filter(x => x.id !== id);
    renderContent();
    showToast('Record deleted');
  } catch(e) {
    showToast('Failed to delete');
  }
}

function openAddModal() {
  document.getElementById('addClockIn').value  = '';
  document.getElementById('addClockOut').value = '';
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

async function submitAdd() {
  const photographerId = document.getElementById('addPhotographer').value;
  const location       = document.getElementById('addLocation').value;
  const clockIn        = document.getElementById('addClockIn').value;
  const clockOut       = document.getElementById('addClockOut').value;
  if (!photographerId || !clockIn) { showToast('Photographer and clock-in time are required'); return; }
  try {
    const res = await fetch('/api/clock/record', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        photographer_id: photographerId,
        location,
        clock_in:  toUTCIso(clockIn),
        clock_out: clockOut ? toUTCIso(clockOut) : null,
      })
    });
    if (!res.ok) throw new Error();
    const d = await res.json();
    allRecords.push(d.record);
    closeModal();
    renderContent();
    showToast('Record added');
  } catch(e) {
    showToast('Failed to add record');
  }
}

document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>

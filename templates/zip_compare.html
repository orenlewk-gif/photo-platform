<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crystal Images — Zip Compare</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { background:#0c2336; font-family:'DM Sans',sans-serif; color:#fff; min-height:100vh; }

/* Admin bar */
.admin-bar { background:rgba(245,197,24,.1); border-bottom:1px solid rgba(245,197,24,.25); padding:.45rem 1.25rem; font-size:.78rem; color:#F5C518; display:flex; align-items:center; gap:1rem; }
.admin-bar a { color:#F5C518; text-decoration:none; font-weight:600; opacity:.75; }
.admin-bar a:hover { opacity:1; }
.admin-bar .sep { opacity:.3; }

/* Top nav — same as customer */
.custom-header { width:100%; height:120px; background:rgba(4,50,73,0.95); display:flex; align-items:center; padding:0 40px; }
.logo-text { font-family:'Space Mono',monospace; font-size:1.1rem; letter-spacing:.12em; color:#F5C518; font-weight:700; }

/* Container */
.container { max-width:1400px; margin:0 auto; padding:2rem 3rem 4rem; }

/* Date section */
.day-section { margin-bottom:3rem; }
.day-header { font-size:.75rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:1.5rem; padding-bottom:.65rem; border-bottom:1px solid rgba(255,255,255,.07); }

/* Grid — exact match to customer families grid */
.grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2rem; }
@media(max-width:1000px){ .grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:560px)  { .grid { grid-template-columns:1fr; } }

.grid-card { cursor:pointer; transition:transform .2s; text-decoration:none; color:inherit; display:block; }
.grid-card:hover { transform:translateY(-3px); }
.grid-card:hover .collage-inner { border-color:rgba(242,201,76,.5); }

.collage-inner { border:2px solid rgba(255,255,255,.08); border-radius:6px; overflow:hidden; margin-bottom:.75rem; transition:border-color .2s; }
.collage-2x2 { display:grid; grid-template-columns:1fr 1fr; gap:2px; background:#0a1e2e; }
.collage-2x2 img { width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:#0a1e2e; }
.collage-placeholder { width:100%; aspect-ratio:1/1; background:#0a1e2e; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.12); font-size:2rem; }

.card-title { font-size:1rem; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:#fff; margin-bottom:.25rem; text-align:center; text-decoration:underline; text-underline-offset:3px; }
.card-sub { font-size:.8rem; color:rgba(255,255,255,.45); text-align:center; margin-bottom:.5rem; }

/* Pricing pills under card */
.card-pricing { display:flex; flex-wrap:wrap; justify-content:center; gap:.35rem; margin-top:.4rem; }
.tier-pill { background:rgba(242,201,76,.1); border:1px solid rgba(242,201,76,.25); color:#F5C518; font-size:.72rem; font-weight:600; padding:2px 10px; border-radius:14px; white-space:nowrap; }
.no-size-badge { font-size:.72rem; color:rgba(255,255,255,.25); background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:2px 10px; }

.empty { color:rgba(255,255,255,.35); padding:4rem; text-align:center; }
</style>
</head>
<body>

<div class="admin-bar">
  ADMIN — ZIP PRICING COMPARE
  <span class="sep">|</span>
  <a href="/admin/zip-folders">← Folder Assignment</a>
  <a href="/admin/zip-pricing">Edit Pricing</a>
</div>

<div class="custom-header">
  <div class="logo-text">CRYSTAL IMAGES</div>
</div>

<div class="container">
  <div id="content"><div class="empty">Loading…</div></div>
</div>

<script>
window.addEventListener('load', async () => {
  const res = await fetch('/api/zip-compare');
  if (!res.ok) { document.getElementById('content').innerHTML = '<div class="empty">Not authorized.</div>'; return; }
  const d = await res.json();
  render(d.folders || []);
});

function formatDate(dateStr) {
  return new Date(dateStr + 'T12:00:00').toLocaleDateString([], {weekday:'long', month:'long', day:'numeric'});
}

function pricingPills(tier) {
  if (!tier) return '<span class="no-size-badge">No size set</span>';
  const opts = [
    {label:'1 Photo', price: tier.one_photo},
    {label:'2 Photos', price: tier.two_photos},
    {label:'3 Photos', price: tier.three_photos},
    {label:'All', price: tier.all_photos},
  ].filter(o => o.price);
  if (!opts.length) return '<span class="no-size-badge">No prices set</span>';
  return opts.map(o => `<span class="tier-pill">${o.label} $${o.price}</span>`).join('');
}

function render(folders) {
  if (!folders.length) {
    document.getElementById('content').innerHTML = '<div class="empty">No zip folders found.</div>';
    return;
  }

  // Group by date
  const byDate = {};
  folders.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });

  document.getElementById('content').innerHTML = Object.keys(byDate)
    .sort((a,b) => b.localeCompare(a))
    .map(date => `
      <div class="day-section">
        <div class="day-header">${formatDate(date)}</div>
        <div class="grid">
          ${byDate[date].map(f => `
            <a class="grid-card" href="/admin/zip-preview/${f.date}/${encodeURIComponent(f.last_name)}" target="_blank">
              <div class="collage-inner">
                <div class="collage-2x2">
                  ${[0,1,2,3].map(i => f.previews[i]
                    ? `<img src="${f.previews[i]}" loading="lazy" alt="">`
                    : `<div class="collage-placeholder">📷</div>`
                  ).join('')}
                </div>
              </div>
              <div class="card-title">${f.last_name}</div>
              <div class="card-sub">${f.location} · ${f.photo_count} photos${f.group_size ? ' · ' + f.group_size + ' people' : ''}</div>
              <div class="card-pricing">${pricingPills(f.tier)}</div>
            </a>`).join('')}
        </div>
      </div>`).join('');
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zip Line Pricing — Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{padding:1.5rem;max-width:640px;margin:0 auto}
h2{font-size:1.1rem;font-weight:600;margin-bottom:.4rem}
.sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:1.75rem}
.tier-list{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.25rem}
.tier-row{display:grid;grid-template-columns:1fr 1fr auto;gap:.75rem;align-items:center;background:#0a1e2e;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.85rem 1rem}
.tier-row label{font-size:.72rem;color:rgba(255,255,255,.35);display:block;margin-bottom:.25rem}
.tier-row input,.tier-row select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;color:#fff;padding:.5rem .75rem;font-size:.9rem;outline:none}
.tier-row input:focus,.tier-row select:focus{border-color:#F5C518}
.btn{border:none;border-radius:7px;padding:.55rem 1.1rem;font-size:.85rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:.35rem}
.btn-primary{background:#F5C518;color:#0c2336}
.btn-primary:hover{background:#e6b800}
.btn-ghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.btn-ghost:hover{background:rgba(255,255,255,.12)}
.btn-danger{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:#f87171}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.actions{display:flex;gap:.75rem;margin-top:1rem}
.notice{background:rgba(245,197,24,.07);border:1px solid rgba(245,197,24,.2);border-radius:8px;padding:.75rem 1rem;font-size:.82rem;color:rgba(255,255,255,.6);margin-bottom:1.5rem}
.notice strong{color:#F5C518}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;transition:opacity .3s;opacity:0}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — ZIP PRICING (TEST)</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/zip-folders">Folder Assignment</a>
  <a href="/admin/dashboard" style="margin-left:.75rem">Dashboard</a>
</div>

<div class="main">
  <h2>Group Size Pricing</h2>
  <p class="sub">Set the price for each group size. These apply to all zip line folders with that group size assigned.</p>

  <div class="notice">
    <strong>Test environment</strong> — separate from live pricing. Changes here only affect zip line test pages.
  </div>

  <div class="tier-list" id="tierList"></div>

  <div class="actions">
    <button class="btn btn-ghost" onclick="addTier()">+ Add Group Size</button>
    <button class="btn btn-primary" onclick="savePricing()">Save Pricing</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tiers = [];

window.addEventListener('load', async () => {
  const res = await fetch('/api/zip-pricing');
  const d = await res.json();
  tiers = d.tiers || [];
  if (!tiers.length) {
    tiers = [
      {people: 1, price: ''},
      {people: 2, price: ''},
      {people: 3, price: ''},
      {people: 4, price: ''},
      {people: 5, price: ''},
      {people: '6+', price: ''},
    ];
  }
  render();
});

function render() {
  document.getElementById('tierList').innerHTML = tiers.map((t, i) => `
    <div class="tier-row">
      <div>
        <label>Number of People</label>
        <input type="text" value="${t.people}" onchange="tiers[${i}].people=this.value" placeholder="e.g. 2 or 6+">
      </div>
      <div>
        <label>Price ($)</label>
        <input type="number" value="${t.price}" onchange="tiers[${i}].price=parseFloat(this.value)||0" placeholder="0.00" min="0" step="0.01">
      </div>
      <div style="padding-top:1.1rem">
        <button class="btn btn-danger" style="padding:.45rem .65rem" onclick="removeTier(${i})">✕</button>
      </div>
    </div>`).join('');
}

function addTier() {
  tiers.push({people: '', price: ''});
  render();
}

function removeTier(i) {
  tiers.splice(i, 1);
  render();
}

async function savePricing() {
  const res = await fetch('/api/zip-pricing', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({tiers})
  });
  if (res.ok) showToast('Pricing saved');
  else showToast('Failed to save');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Upload — Crystal Images</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:56px}
.topbar-logo{font-size:.9rem;letter-spacing:.1em;color:#F5C518;font-weight:700}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.45);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{max-width:680px;margin:0 auto;padding:2rem 1.5rem 4rem}
h2{font-size:1.1rem;font-weight:600;margin-bottom:.35rem}
.sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:2rem}

/* Form */
.fields{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;margin-bottom:1.25rem}
@media(max-width:600px){.fields{grid-template-columns:1fr}}
.field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.4rem}
.field input,.field select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;padding:.65rem .85rem;font-size:.9rem;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:#F5C518}
.field select option{background:#0c2336}
.folder-field{margin-bottom:1.25rem}
.folder-field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.4rem}
.folder-field input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;padding:.65rem .85rem;font-size:.9rem;font-family:inherit;outline:none}
.folder-field input:focus{border-color:#F5C518}

/* Drop zone */
.dropzone{border:2px dashed rgba(255,255,255,.15);border-radius:14px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:1.25rem}
.dropzone:hover,.dropzone.drag{border-color:#F5C518;background:rgba(245,197,24,.04)}
.dropzone-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.dropzone-text{font-size:1rem;font-weight:500;color:rgba(255,255,255,.6)}
.dropzone-sub{font-size:.8rem;color:rgba(255,255,255,.3);margin-top:.4rem}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* Detected folder list */
.folder-list{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:1.25rem;overflow:hidden;display:none}
.folder-item{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1rem;border-bottom:1px solid rgba(255,255,255,.05)}
.folder-item:last-child{border-bottom:none}
.fi-name{font-size:.88rem;font-weight:600;color:#fff}
.fi-count{font-size:.78rem;color:rgba(255,255,255,.4)}
.folder-total{padding:.5rem 1rem;font-size:.78rem;font-weight:700;color:#F5C518;border-top:1px solid rgba(255,255,255,.07);text-align:right}

/* Upload button */
.upload-btn{width:100%;background:#F5C518;color:#0c2336;border:none;border-radius:10px;padding:.85rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-bottom:1.5rem}
.upload-btn:hover{background:#ffd700}
.upload-btn:disabled{opacity:.4;cursor:not-allowed}

/* Progress */
.progress-wrap{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.5rem 1.75rem;margin-bottom:1.5rem;display:none;text-align:center}
.progress-pct{font-size:2.5rem;font-weight:700;color:#F5C518;margin-bottom:.5rem;letter-spacing:-1px}
.progress-label{font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:1rem}
.progress-bar-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:#F5C518;width:0%;transition:width .15s;border-radius:4px}

/* Done card */
.done-card{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:1.5rem 1.75rem;display:none;text-align:center}
.done-card h3{font-size:1rem;font-weight:700;color:#4ade80;margin-bottom:.4rem}
.done-card p{font-size:.82rem;color:rgba(255,255,255,.45);margin-bottom:.35rem}
.done-card code{font-size:.78rem;color:#F5C518;font-family:'SF Mono',Menlo,monospace;display:block;margin:.5rem 0 1.25rem}
.folders-btn{display:inline-block;background:#4ade80;color:#0c2336;border:none;border-radius:8px;padding:.7rem 1.75rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .2s}
.folders-btn:hover{background:#22c55e}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — UPLOAD</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/folders">Folders</a>
  <a href="/admin/dashboard">Dashboard</a>
</div>

<div class="main">
  <h2>Upload Photos</h2>
  <p class="sub">Drop multiple folders at once — each folder name becomes the last name or group.</p>

  <div class="fields">
    <div class="field">
      <label>Date</label>
      <input type="date" id="date" />
    </div>
    <div class="field">
      <label>Location</label>
      <select id="location">
        <option value="">— Select —</option>
        <option>Adventure Zip</option>
        <option>Adventure Zip Line</option>
        <option>Nature Zip Line</option>
        <option>Mountain Biking</option>
        <option>Lone Peak Portraits</option>
        <option>Explorer Gondola</option>
        <option>Ramcharger Portraits</option>
      </select>
    </div>
  </div>

  <!-- Shown only when loose files dropped (no folder structure) -->
  <div class="folder-field" id="folder-field" style="display:none">
    <label>Last Name / Group</label>
    <input type="text" id="folder" placeholder="e.g. Smith or Trail Riders" />
  </div>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">📁</div>
    <div class="dropzone-text">Drop folders or photos here</div>
    <div class="dropzone-sub" id="drop-sub">Nothing selected yet</div>
    <input type="file" id="file-input" accept="image/*" multiple />
  </div>

  <!-- Detected folders list -->
  <div class="folder-list" id="folder-list"></div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-pct" id="progress-pct">0%</div>
    <div class="progress-label" id="progress-label">Starting…</div>
    <div class="progress-bar-track"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <button class="upload-btn" id="upload-btn" disabled onclick="startUpload()">Upload Photos</button>

  <div class="done-card" id="done-card">
    <h3 id="done-heading">Upload complete</h3>
    <p id="done-count"></p>
    <code id="done-path"></code>
    <div id="done-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONCURRENCY = 10;

// State
let detectedFolders = []; // [{name, files[]}]
let flatFiles       = []; // File[] — loose drop with no folder structure
let folderMode      = false;

document.getElementById('date').value = new Date().toISOString().slice(0, 10);

// ── File input (flat files only) ─────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function() {
  setFlatMode([...this.files].filter(f => /\.(jpg|jpeg|png)$/i.test(f.name)));
});

// ── Drag & drop ───────────────────────────────────────────────────────────────
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', async e => {
  e.preventDefault();
  dropzone.classList.remove('drag');

  const items = [...e.dataTransfer.items];
  const folders = [];
  const loose   = [];

  for (const item of items) {
    const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
    if (!entry) continue;
    if (entry.isDirectory) {
      const files = await readDirFiles(entry);
      if (files.length) folders.push({ name: entry.name, files });
    } else if (entry.isFile) {
      const file = await new Promise(res => entry.file(res));
      if (/\.(jpg|jpeg|png)$/i.test(file.name)) loose.push(file);
    }
  }

  if (folders.length) setFolderMode(folders);
  else if (loose.length) setFlatMode(loose);
});

// Read all entries from a DirectoryReader (handles >100 limit via repeated calls)
async function readAllEntries(reader) {
  const all = [];
  while (true) {
    const batch = await new Promise(res => reader.readEntries(res, () => res([])));
    if (!batch.length) break;
    all.push(...batch);
  }
  return all;
}

async function readDirFiles(dirEntry) {
  const files = [];
  const entries = await readAllEntries(dirEntry.createReader());
  for (const entry of entries) {
    if (entry.isFile) {
      const file = await new Promise(res => entry.file(res));
      if (/\.(jpg|jpeg|png)$/i.test(file.name)) files.push(file);
    }
    // Recurse one level deep (sub-folders within a dropped folder)
    if (entry.isDirectory) {
      const sub = await readDirFiles(entry);
      files.push(...sub);
    }
  }
  return files;
}

// ── Mode switching ────────────────────────────────────────────────────────────
function setFolderMode(folders) {
  detectedFolders = folders;
  flatFiles = [];
  folderMode = true;
  document.getElementById('folder-field').style.display = 'none';
  const total = folders.reduce((s, f) => s + f.files.length, 0);
  document.getElementById('drop-sub').textContent =
    `${folders.length} folder${folders.length !== 1 ? 's' : ''} — ${total} photos`;
  renderFolderList();
  updateBtn();
}

function setFlatMode(files) {
  detectedFolders = [];
  flatFiles = files;
  folderMode = false;
  document.getElementById('folder-field').style.display = '';
  document.getElementById('folder-list').style.display  = 'none';
  document.getElementById('drop-sub').textContent =
    `${files.length} photo${files.length !== 1 ? 's' : ''} selected`;
  updateBtn();
}

function renderFolderList() {
  const el    = document.getElementById('folder-list');
  const total = detectedFolders.reduce((s, f) => s + f.files.length, 0);
  el.innerHTML = detectedFolders.map(f =>
    `<div class="folder-item">
      <span class="fi-name">${f.name}</span>
      <span class="fi-count">${f.files.length} photos</span>
    </div>`
  ).join('') + `<div class="folder-total">${total} photos total</div>`;
  el.style.display = '';
}

function updateBtn() {
  const hasContent = folderMode ? detectedFolders.length > 0 : flatFiles.length > 0;
  document.getElementById('upload-btn').disabled = !hasContent || !validate();
}

function validate() {
  return document.getElementById('date').value && document.getElementById('location').value;
}

['date', 'location', 'folder'].forEach(id => {
  const el = document.getElementById(id);
  if (el) ['change', 'input'].forEach(ev => el.addEventListener(ev, updateBtn));
});

// ── Progress ──────────────────────────────────────────────────────────────────
function setProgress(done, total, label) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('progress-bar').style.width   = pct + '%';
  document.getElementById('progress-label').textContent = label || `${done} of ${total} uploaded`;
}

// ── Upload ────────────────────────────────────────────────────────────────────
async function startUpload() {
  if (!validate()) return;
  const date     = document.getElementById('date').value;
  const location = document.getElementById('location').value;

  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('done-card').style.display     = 'none';

  // Build folder list: multi-folder mode OR single folder from field
  const folders = folderMode
    ? detectedFolders
    : [{ name: document.getElementById('folder').value.trim(), files: flatFiles }];

  const total = folders.reduce((s, f) => s + f.files.length, 0);
  let done = 0, errors = 0;
  setProgress(0, total);

  // Presign all folders
  const allItems = []; // [{url, key, file, folderName}]
  try {
    for (const f of folders) {
      const res = await fetch('/api/admin/upload/presign', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          date, location, folder: f.name,
          files: f.files.map(file => ({ name: file.name, type: file.type || 'image/jpeg' }))
        })
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || 'Presign failed');
      d.urls.forEach((u, i) => allItems.push({ ...u, file: f.files[i], folderName: f.name }));
    }
  } catch(e) {
    showToast('Failed to start: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Upload Photos';
    document.getElementById('progress-wrap').style.display = 'none';
    return;
  }

  // Upload concurrently across all folders
  const queue = [...allItems];
  async function worker() {
    while (queue.length) {
      const item = queue.shift();
      try {
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('PUT', item.url);
          xhr.setRequestHeader('Content-Type', item.file.type || 'image/jpeg');
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) { item.ok = true; done++; setProgress(done, total); resolve(); }
            else reject(new Error('HTTP ' + xhr.status));
          };
          xhr.onerror = () => reject(new Error('Network error'));
          xhr.send(item.file);
        });
      } catch(e) { errors++; done++; setProgress(done, total); }
    }
  }
  await Promise.all(Array.from({ length: CONCURRENCY }, worker));

  const succeeded = total - errors;
  if (succeeded === 0) {
    showToast('No photos uploaded — check your connection and try again');
    document.getElementById('progress-wrap').style.display = 'none';
    btn.textContent = 'Upload Photos';
    btn.disabled = false;
    return;
  }

  // Auto-index each folder as draft
  setProgress(succeeded, total, 'Indexing…');
  let totalIndexed = 0;
  for (const f of folders) {
    const keys = allItems.filter(i => i.folderName === f.name && i.ok).map(i => i.key);
    if (!keys.length) continue;
    try {
      const res = await fetch('/api/admin/upload/index', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ date, location, folder: f.name, keys })
      });
      const d = await res.json();
      totalIndexed += d.indexed || 0;
    } catch(e) {}
  }

  // Done
  const locSlug = location.toLowerCase().replace(/ /g, '-');
  setProgress(succeeded, total, `${succeeded} uploaded · ${totalIndexed} indexed as draft`);
  document.getElementById('done-heading').textContent = 'Ready to publish';
  document.getElementById('done-count').textContent =
    folders.length > 1
      ? `${folders.length} folders — ${succeeded} photos indexed as draft.`
      : `${succeeded} photo${succeeded !== 1 ? 's' : ''} indexed as draft.`;
  document.getElementById('done-path').textContent = `images/${date}/${locSlug}/`;
  document.getElementById('done-actions').innerHTML =
    `<a class="folders-btn" href="/admin/folders">Go to Folders →</a>`;
  document.getElementById('done-card').style.display = 'block';

  btn.textContent = 'Upload More';
  btn.disabled    = false;
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>

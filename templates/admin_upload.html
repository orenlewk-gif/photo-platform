<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Upload — Crystal Images</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'DM Sans',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.5rem;height:56px}
.topbar-logo{font-size:.9rem;letter-spacing:.1em;color:#F5C518;font-weight:700}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.45);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{max-width:680px;margin:0 auto;padding:2rem 1.5rem 4rem}
h2{font-size:1.1rem;font-weight:600;margin-bottom:.35rem}
.sub{font-size:.85rem;color:rgba(255,255,255,.4);margin-bottom:2rem}

/* Form */
.fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem;margin-bottom:1.25rem}
@media(max-width:600px){.fields{grid-template-columns:1fr}}
.field label{display:block;font-size:.72rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:.4rem}
.field input,.field select{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;padding:.65rem .85rem;font-size:.9rem;font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:#F5C518}
.field select option{background:#0c2336}

/* Path preview */
.path-preview{display:flex;align-items:center;gap:.65rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:.55rem .9rem;margin-bottom:1.25rem}
.path-label{font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.3);white-space:nowrap}
.path-preview code{font-size:.8rem;color:#F5C518;word-break:break-all;font-family:'SF Mono',Menlo,monospace}

/* Drop zone */
.dropzone{border:2px dashed rgba(255,255,255,.15);border-radius:14px;padding:3rem 2rem;text-align:center;cursor:pointer;transition:all .2s;position:relative;margin-bottom:1.25rem}
.dropzone:hover,.dropzone.drag{border-color:#F5C518;background:rgba(245,197,24,.04)}
.dropzone-icon{font-size:2.5rem;margin-bottom:.75rem;opacity:.4}
.dropzone-text{font-size:1rem;font-weight:500;color:rgba(255,255,255,.6)}
.dropzone-sub{font-size:.8rem;color:rgba(255,255,255,.3);margin-top:.4rem}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* Upload button */
.upload-btn{width:100%;background:#F5C518;color:#0c2336;border:none;border-radius:10px;padding:.85rem;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-bottom:1.5rem}
.upload-btn:hover{background:#ffd700}
.upload-btn:disabled{opacity:.4;cursor:not-allowed}

/* Progress */
.progress-wrap{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1.5rem 1.75rem;margin-bottom:1.5rem;display:none;text-align:center}
.progress-pct{font-size:2.5rem;font-weight:700;color:#F5C518;margin-bottom:.5rem;letter-spacing:-1px}
.progress-label{font-size:.85rem;color:rgba(255,255,255,.45);margin-bottom:1rem}
.progress-bar-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.progress-bar{height:100%;background:#F5C518;width:0%;transition:width .15s;border-radius:4px}

/* Done card */
.done-card{background:rgba(74,222,128,.07);border:1px solid rgba(74,222,128,.2);border-radius:12px;padding:1.5rem 1.75rem;display:none;text-align:center}
.done-card h3{font-size:1rem;font-weight:700;color:#4ade80;margin-bottom:.4rem}
.done-card p{font-size:.82rem;color:rgba(255,255,255,.45);margin-bottom:.35rem}
.done-card code{font-size:.78rem;color:#F5C518;font-family:'SF Mono',Menlo,monospace;display:block;margin:.5rem 0 1.25rem}
.folders-btn{display:inline-block;background:#4ade80;color:#0c2336;border:none;border-radius:8px;padding:.7rem 1.75rem;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:background .2s}
.folders-btn:hover{background:#22c55e}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — UPLOAD</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/folders">Folders</a>
  <a href="/admin/dashboard">Dashboard</a>
</div>

<div class="main">
  <h2>Upload Photos</h2>
  <p class="sub">Photos go directly to R2. Head to Folders after to index and push live.</p>

  <div class="fields">
    <div class="field">
      <label>Date</label>
      <input type="date" id="date" />
    </div>
    <div class="field">
      <label>Location</label>
      <select id="location">
        <option value="">— Select —</option>
        <option>Adventure Zip</option>
        <option>Adventure Zip Line</option>
        <option>Nature Zip Line</option>
        <option>Mountain Biking</option>
        <option>Lone Peak Portraits</option>
        <option>Explorer Gondola</option>
        <option>Ramcharger Portraits</option>
      </select>
    </div>
    <div class="field">
      <label>Last Name / Group</label>
      <input type="text" id="folder" placeholder="e.g. Smith or Trail Riders" />
    </div>
  </div>

  <div class="path-preview" id="path-preview" style="display:none">
    <span class="path-label">R2 path</span>
    <code id="path-text"></code>
  </div>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">📷</div>
    <div class="dropzone-text">Drop photos here or click to browse</div>
    <div class="dropzone-sub" id="drop-sub">No files selected</div>
    <input type="file" id="file-input" accept="image/*" multiple />
  </div>

  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-pct" id="progress-pct">0%</div>
    <div class="progress-label" id="progress-label">Starting…</div>
    <div class="progress-bar-track"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <button class="upload-btn" id="upload-btn" disabled onclick="startUpload()">Upload Photos</button>

  <div class="done-card" id="done-card">
    <h3 id="done-heading">Upload complete</h3>
    <p id="done-count"></p>
    <code id="done-path"></code>
    <div id="done-actions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONCURRENCY = 10;
let selectedFiles = [];

document.getElementById('date').value = new Date().toISOString().slice(0, 10);

const fileInput = document.getElementById('file-input');
const dropzone  = document.getElementById('dropzone');

fileInput.addEventListener('change', () => setFiles([...fileInput.files]));
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag');
  setFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});

function setFiles(files) {
  selectedFiles = files;
  document.getElementById('drop-sub').textContent = files.length
    ? `${files.length} photo${files.length !== 1 ? 's' : ''} selected`
    : 'No files selected';
  document.getElementById('upload-btn').disabled = !files.length || !validate();
}

function validate() {
  return document.getElementById('date').value && document.getElementById('location').value;
}

['date','location','folder'].forEach(id => {
  ['change','input'].forEach(ev => {
    document.getElementById(id).addEventListener(ev, () => {
      document.getElementById('upload-btn').disabled = !validate() || !selectedFiles.length;
      updatePathPreview();
    });
  });
});

function updatePathPreview() {
  const date   = document.getElementById('date').value;
  const loc    = document.getElementById('location').value;
  const folder = document.getElementById('folder').value.trim();
  const prev   = document.getElementById('path-preview');
  if (!date || !loc) { prev.style.display = 'none'; return; }
  const locSlug    = loc.toLowerCase().replace(/ /g, '-');
  const folderSlug = folder ? folder.toLowerCase().replace(/ /g, '-') + '/' : '';
  document.getElementById('path-text').textContent = `images/${date}/${locSlug}/${folderSlug}{filename}`;
  prev.style.display = 'flex';
}

function setProgress(done, total) {
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent   = pct + '%';
  document.getElementById('progress-bar').style.width   = pct + '%';
  document.getElementById('progress-label').textContent = `${done} of ${total} uploaded`;
}

async function startUpload() {
  if (!validate() || !selectedFiles.length) return;
  const date     = document.getElementById('date').value;
  const location = document.getElementById('location').value;
  const folder   = document.getElementById('folder').value.trim();

  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('done-card').style.display     = 'none';

  // Get presigned URLs
  let urlData;
  try {
    const res = await fetch('/api/admin/upload/presign', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        date, location, folder,
        files: selectedFiles.map(f => ({name: f.name, type: f.type || 'image/jpeg'}))
      })
    });
    urlData = await res.json();
    if (!res.ok) throw new Error(urlData.error || 'Presign failed');
  } catch(e) {
    showToast('Failed to start: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Upload Photos';
    document.getElementById('progress-wrap').style.display = 'none';
    return;
  }

  const urls  = urlData.urls;
  const total = urls.length;
  let done    = 0;
  let errors  = 0;
  setProgress(0, total);

  const queue = urls.map((u, i) => ({u, i, file: selectedFiles[i]}));

  async function worker() {
    while (queue.length) {
      const {u, file} = queue.shift();
      try {
        await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open('PUT', u.url);
          xhr.setRequestHeader('Content-Type', file.type || 'image/jpeg');
          xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) { done++; setProgress(done, total); resolve(); }
            else reject(new Error('HTTP ' + xhr.status));
          };
          xhr.onerror = () => reject(new Error('Network error'));
          xhr.send(file);
        });
      } catch(e) {
        errors++;
        done++;
        setProgress(done, total);
      }
    }
  }

  await Promise.all(Array.from({length: CONCURRENCY}, worker));

  const succeeded = total - errors;
  const locSlug   = location.toLowerCase().replace(/ /g, '-');
  const fSlug     = folder ? folder.toLowerCase().replace(/ /g, '-') + '/' : '';
  const path      = `images/${date}/${locSlug}/${fSlug}`;

  document.getElementById('progress-label').textContent = errors
    ? `${succeeded} uploaded, ${errors} failed`
    : `${succeeded} photos uploaded`;

  if (succeeded === 0) {
    showToast('No photos uploaded — check your connection and try again');
    document.getElementById('progress-wrap').style.display = 'none';
    btn.textContent = 'Upload Photos';
    btn.disabled = false;
    return;
  }

  // Auto-index as draft
  document.getElementById('progress-label').textContent = 'Indexing…';
  const successKeys = urls.slice(0, succeeded).map(u => u.key);
  let indexed = 0;
  try {
    const idxRes = await fetch('/api/admin/upload/index', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date, location, folder, keys: successKeys })
    });
    const idxData = await idxRes.json();
    indexed = idxData.indexed || 0;
  } catch(e) {}

  document.getElementById('progress-label').textContent = `${succeeded} uploaded, ${indexed} indexed`;
  document.getElementById('done-heading').textContent   = indexed ? 'Ready to publish' : 'Uploaded';
  document.getElementById('done-count').textContent     = `${succeeded} photo${succeeded !== 1 ? 's' : ''} uploaded${indexed ? `, ${indexed} indexed as draft` : ''}.`;
  document.getElementById('done-path').textContent      = path;

  const actionsEl = document.getElementById('done-actions');
  if (indexed) {
    actionsEl.innerHTML = `
      <button class="folders-btn" id="push-live-btn" onclick="pushLive('${date}','${location.replace(/'/g,"\\'")}','${folder.replace(/'/g,"\\'")}')">Push Live</button>
      <a class="folders-btn" href="/admin/folders" style="background:rgba(255,255,255,.12);color:#fff;margin-left:.75rem;">Folders →</a>`;
  } else {
    actionsEl.innerHTML = `<a class="folders-btn" href="/admin/folders">Go to Folders →</a>`;
  }

  document.getElementById('done-card').style.display = 'block';
  btn.textContent = 'Upload More';
  btn.disabled    = false;
}

async function pushLive(date, location, folder) {
  const btn = document.getElementById('push-live-btn');
  btn.textContent = 'Publishing…';
  btn.disabled = true;
  try {
    const res = await fetch('/api/admin/push-live', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date, location, folder })
    });
    const d = await res.json();
    btn.textContent = `✓ Live (${d.pushed} photos)`;
    btn.style.background = '#4ade80';
    btn.style.color = '#0c2336';
  } catch(e) {
    btn.textContent = 'Push Live';
    btn.disabled = false;
    showToast('Push live failed — try from Folders page');
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>

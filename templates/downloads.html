<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Images — Downloads</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{padding:1.5rem;max-width:900px;margin:0 auto}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
h2{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.9)}
.refresh-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);border-radius:7px;padding:.45rem .9rem;font-size:.8rem;cursor:pointer;font-weight:600}
.refresh-btn:hover{background:rgba(255,255,255,.12)}
.empty{text-align:center;color:rgba(255,255,255,.35);padding:4rem;font-size:.95rem}
.photo-card{background:#0a1e2e;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-top{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.card-name{font-size:1.1rem;font-weight:700;flex:1}
.card-date{font-size:.8rem;color:rgba(255,255,255,.4)}
.progress-wrap{margin:.9rem 0 1rem}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;color:rgba(255,255,255,.5);margin-bottom:.4rem}
.progress-bar{background:rgba(255,255,255,.08);border-radius:4px;height:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.progress-fill.ready{background:#4ade80}
.progress-fill.partial{background:#F5C518}
.status-text{font-size:.8rem;margin-top:.35rem}
.status-ready{color:#4ade80}
.status-partial{color:#F5C518}
.btn{border:none;border-radius:8px;padding:.65rem 1.4rem;font-size:.9rem;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:.4rem;white-space:nowrap;transition:.15s}
.btn-download{background:#F5C518;color:#0c2336}
.btn-download:hover{background:#e6b800}
.btn-download:disabled{opacity:.4;cursor:not-allowed}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;transition:opacity .3s;opacity:0}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — DOWNLOADS</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/photographers" style="margin-left:.75rem">Photographers</a>
</div>

<div class="main">
  <div class="header-row">
    <h2>Pending Uploads</h2>
    <button class="refresh-btn" onclick="loadUploads()">↻ Refresh</button>
  </div>
  <div id="content"><div class="empty">Loading…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
let autoRefresh;

window.addEventListener('load', () => {
  loadUploads();
  autoRefresh = setInterval(loadUploads, 15000);
});

async function loadUploads() {
  try {
    const res = await fetch('/api/uploads');
    const d = await res.json();
    const photographers = d.photographers || [];
    const content = document.getElementById('content');

    if (!photographers.length) {
      content.innerHTML = '<div class="empty">No pending uploads</div>';
      return;
    }

    content.innerHTML = photographers.map(p => {
      const received = p.received;
      const expected = p.expected || received;
      const pct = Math.round((received / expected) * 100);
      const ready = received >= expected;
      return `
        <div class="photo-card">
          <div class="card-top">
            <div class="card-name">${p.photographer_name}</div>
            <div class="card-date">${p.latest_date}</div>
          </div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span>Photos ready</span>
              <span>${received} / ${expected}</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill ${ready ? 'ready' : 'partial'}" style="width:${pct}%"></div>
            </div>
            <div class="status-text ${ready ? 'status-ready' : 'status-partial'}">
              ${ready ? '✓ All photos uploaded — ready to download' : `⏳ Upload in progress (${pct}%)`}
            </div>
          </div>
          <button class="btn btn-download" onclick="downloadAll('${p.photographer_id}', this)" ${!ready ? 'style="opacity:.6"' : ''}>
            ⬇ Download All & Done
          </button>
        </div>`;
    }).join('');
  } catch(e) {
    showToast('Failed to load uploads');
  }
}

async function downloadAll(photographerId, btn) {
  btn.disabled = true;
  btn.textContent = 'Preparing ZIP…';
  // Trigger download — server marks as done during zip
  window.location.href = `/api/uploads/zip-all?photographer_id=${encodeURIComponent(photographerId)}`;
  // Reload after a moment
  setTimeout(() => {
    btn.disabled = false;
    loadUploads();
  }, 3000);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crystal Images — Downloads</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0c2336;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh}
.topbar{background:#091928;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:1rem;padding:0 1.25rem;height:56px}
.topbar-logo{font-size:.95rem;letter-spacing:.1em;color:#F5C518}
.topbar-spacer{flex:1}
.topbar a{color:rgba(255,255,255,.5);font-size:.8rem;text-decoration:none}
.topbar a:hover{color:#F5C518}
.main{padding:1.5rem;max-width:860px;margin:0 auto}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
h2{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,.9)}
.refresh-btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);border-radius:7px;padding:.45rem .9rem;font-size:.8rem;cursor:pointer;font-weight:600}
.refresh-btn:hover{background:rgba(255,255,255,.12)}
.empty{text-align:center;color:rgba(255,255,255,.35);padding:4rem;font-size:.95rem}
.batch-card{background:#0a1e2e;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1.1rem 1.25rem;margin-bottom:.85rem;display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap}
.batch-card.ready{border-color:rgba(74,222,128,.2)}
.batch-info{flex:1;min-width:180px}
.batch-top{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.2rem;flex-wrap:wrap}
.batch-name{font-size:1rem;font-weight:700}
.batch-folder{font-size:.85rem;color:rgba(255,255,255,.5)}
.batch-date{font-size:.75rem;color:rgba(255,255,255,.35);margin-left:auto}
.progress-wrap{margin:.6rem 0 .4rem}
.progress-bar{background:rgba(255,255,255,.08);border-radius:4px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .4s}
.progress-fill.ready{background:#4ade80}
.progress-fill.partial{background:#F5C518}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;margin-top:.3rem}
.label-count{color:rgba(255,255,255,.5)}
.label-status.ready{color:#4ade80}
.label-status.partial{color:#F5C518}
.btn{border:none;border-radius:7px;padding:.55rem 1.2rem;font-size:.85rem;cursor:pointer;font-weight:700;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn-download{background:#F5C518;color:#0c2336}
.btn-download:hover{background:#e6b800}
.btn-download:disabled{opacity:.4;cursor:not-allowed}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1a3347;border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:.65rem 1.25rem;font-size:.875rem;color:#fff;z-index:2000;pointer-events:none;transition:opacity .3s;opacity:0}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">CRYSTAL IMAGES — DOWNLOADS</div>
  <div class="topbar-spacer"></div>
  <a href="/admin/dashboard">Dashboard</a>
  <a href="/admin/photographers" style="margin-left:.75rem">Photographers</a>
</div>

<div class="main">
  <div class="header-row">
    <h2>Upload Queue</h2>
    <button class="refresh-btn" onclick="loadBatches()">↻ Refresh</button>
  </div>
  <div id="content"><div class="empty">Loading…</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
window.addEventListener('load', () => {
  loadBatches();
  setInterval(loadBatches, 15000);
});

async function loadBatches() {
  try {
    const res = await fetch('/api/uploads');
    const d = await res.json();
    const batches = d.batches || [];
    const content = document.getElementById('content');

    if (!batches.length) {
      content.innerHTML = '<div class="empty">No pending uploads</div>';
      return;
    }

    content.innerHTML = batches.map(b => {
      const received = b.received;
      const expected = b.expected || received;
      const pct = Math.round((received / expected) * 100);
      const ready = received >= expected;
      const folderLabel = b.folder && b.folder !== 'Unfiled' ? `· ${b.folder}` : '';
      return `
        <div class="batch-card ${ready ? 'ready' : ''}">
          <div class="batch-info">
            <div class="batch-top">
              <div class="batch-name">${b.photographer_name}</div>
              <div class="batch-folder">${folderLabel}</div>
              <div class="batch-date">${b.date}</div>
            </div>
            <div class="progress-wrap">
              <div class="progress-bar">
                <div class="progress-fill ${ready ? 'ready' : 'partial'}" style="width:${pct}%"></div>
              </div>
              <div class="progress-label">
                <span class="label-count">${received} / ${expected} photos</span>
                <span class="label-status ${ready ? 'ready' : 'partial'}">${ready ? '✓ Ready' : `⏳ ${pct}%`}</span>
              </div>
            </div>
          </div>
          <button class="btn btn-download" onclick="downloadBatch('${b.batch_id.replace(/'/g,"\\'")}', this)">
            ⬇ Download & Done
          </button>
        </div>`;
    }).join('');
  } catch(e) {
    showToast('Failed to load uploads');
  }
}

function downloadBatch(batchId, btn) {
  btn.disabled = true;
  btn.textContent = 'Preparing…';
  window.location.href = `/api/uploads/zip-all?batch_id=${encodeURIComponent(batchId)}`;
  setTimeout(() => { loadBatches(); }, 3000);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
